<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Fiyatlama Analiz Raporu — 2026-01</title>
<style>
@page { size: A4; margin: 0; }
html, body { width: 210mm; margin: 0; padding: 0; }
body {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 8pt;
  line-height: 1.4;
  color: #222;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Page container ── */
.page {
  width: 210mm;
  min-height: 297mm;
  padding: 14mm 16mm 20mm 16mm;
  page-break-after: always;
  position: relative;
}
.page:last-child { page-break-after: auto; }

/* ── Header ── */
.hdr {
  border-bottom: 2.5px solid #10B981;
  padding-bottom: 3mm;
  margin-bottom: 4mm;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.hdr-title {
  font-size: 13pt;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #1F2937;
}
.hdr-meta {
  text-align: right;
  font-size: 8pt;
  color: #6B7280;
  line-height: 1.5;
}

/* ── Section titles ── */
.section-title {
  font-size: 9pt;
  font-weight: bold;
  color: #1F2937;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 4mm 0 2mm 0;
  padding-bottom: 1mm;
  border-bottom: 1px solid #E5E7EB;
}

/* ── Tables ── */
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 7.5pt;
  margin-bottom: 3mm;
}
th, td { padding: 1.2mm 2mm; border: 1px solid #D1D5DB; }
th { background: #F3F4F6; text-align: left; font-weight: 600; color: #374151; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
.highlight-row { background: #ECFDF5; font-weight: bold; }

/* ── Risk badge ── */
.risk-badge {
  display: inline-block;
  padding: 1mm 3mm;
  border-radius: 2mm;
  font-size: 8pt;
  font-weight: bold;
  color: white;
}
.risk-low { background: #10B981; }
.risk-medium { background: #F59E0B; }
.risk-high { background: #EF4444; }

/* ── Summary cards ── */
.cards {
  display: flex;
  gap: 3mm;
  margin-bottom: 4mm;
}
.card {
  flex: 1;
  border: 1px solid #E5E7EB;
  border-radius: 2mm;
  padding: 2.5mm 3mm;
  text-align: center;
}
.card-label { font-size: 6.5pt; color: #6B7280; margin-bottom: 1mm; }
.card-value { font-size: 11pt; font-weight: bold; color: #1F2937; }
.card-unit { font-size: 7pt; color: #9CA3AF; }
.card-green .card-value { color: #10B981; }
.card-amber .card-value { color: #F59E0B; }
.card-red .card-value { color: #EF4444; }

/* ── Simulation table ── */
.sim-table th { background: #10B981; color: white; text-align: center; }
.sim-table th:first-child { text-align: left; }
.sim-table td { text-align: right; font-variant-numeric: tabular-nums; }
.sim-table td:first-child { text-align: left; }
.sim-safe { background: #ECFDF5; font-weight: bold; }

/* ── Explanation box ── */
.explain-box {
  background: #F0FDF4;
  border-left: 3px solid #10B981;
  padding: 2.5mm 4mm;
  margin: 3mm 0;
  font-size: 7.5pt;
  line-height: 1.5;
}
.explain-box b { color: #065F46; }

/* ── Warning box ── */
.warn-box {
  background: #FEF3C7;
  border-left: 3px solid #F59E0B;
  padding: 2.5mm 4mm;
  margin: 3mm 0;
  font-size: 7.5pt;
}

/* ── Footer ── */
.ftr {
  position: absolute;
  bottom: 8mm;
  left: 16mm;
  right: 16mm;
  font-size: 6.5pt;
  color: #9CA3AF;
  border-top: 1px solid #E5E7EB;
  padding-top: 2mm;
  display: flex;
  justify-content: space-between;
}

/* ── Legal ── */
.legal {
  font-size: 6pt;
  color: #9CA3AF;
  margin-top: 4mm;
  line-height: 1.3;
}

/* ── Watermark (demo mode) ── */
.watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-35deg);
  font-size: 48pt;
  font-weight: bold;
  color: rgba(239, 68, 68, 0.12);
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
  letter-spacing: 4px;
}
</style>
</head>
